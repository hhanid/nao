name: Publish nao skills

on:
    push:
        branches:
            - main
        paths:
            - 'skills/**'
            - 'scripts/build_skills_registry.py'
            - '.github/workflows/skills-publish.yml'
    workflow_dispatch: # allow manual runs

jobs:
    validate-and-publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Install build dependencies
              run: pip install pyyaml

            - name: Build skills registry
              env:
                  VERSION: ${{ github.sha }}
              run: |
                  python scripts/build_skills_registry.py --version "${VERSION:0:7}"

            - name: Setup Vercel CLI
              run: npm install --global vercel@latest

            - name: Pull Vercel project config
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SKILLS_PROJECT_ID }}
              run: |
                  vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

            - name: Deploy to Vercel
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SKILLS_PROJECT_ID }}
              run: |
                  cd dist
                  vercel deploy --prod --yes --token="$VERCEL_TOKEN" --archive=tgz

    validate-only:
        # Run on PRs that touch skills — validate, but don't publish.
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - run: pip install pyyaml

            - name: Validate skills registry
              run: python scripts/build_skills_registry.py --version pr-${{ github.event.pull_request.number }}
