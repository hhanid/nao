name: Publish to PyPI

on:
    push:
        tags:
            - 'v*'

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-15
                      platform: darwin
                      arch: arm64
                      wheel-tag: macosx_15_0_arm64
                    - os: macos-15-intel
                      platform: darwin
                      arch: x64
                      wheel-tag: macosx_15_0_x86_64
                    - os: ubuntu-latest
                      platform: linux
                      arch: x64
                      wheel-tag: manylinux2014_x86_64
                    - os: ubuntu-24.04-arm
                      platform: linux
                      arch: arm64
                      wheel-tag: manylinux2014_aarch64
                    - os: windows-latest
                      platform: win
                      arch: x64
                      wheel-tag: win_amd64

        runs-on: ${{ matrix.os }}
        defaults:
            run:
                shell: bash

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Get version from tag
              id: version
              run: |
                  # Extract version from tag (v0.0.35 -> 0.0.35)
                  VERSION=${GITHUB_REF#refs/tags/v}
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Building version: $VERSION"

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.11'

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Setup uv
              uses: astral-sh/setup-uv@v5

            - name: Install Python build dependencies
              run: uv pip install --system cyclopts

            - name: Install npm dependencies
              run: bun install
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Update version in package files
              run: |
                  VERSION=${{ steps.version.outputs.version }}

                  # Update pyproject.toml
                  sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" cli/pyproject.toml

                  # Update __init__.py
                  sed -i.bak "s/^__version__ = \".*\"/__version__ = \"$VERSION\"/" cli/nao_core/__init__.py

                  echo "Updated version to $VERSION"
                  grep "^version" cli/pyproject.toml
                  grep "__version__" cli/nao_core/__init__.py

            - name: Mark as production build
              run: echo 'BUILD_MODE = "prod"' > cli/nao_core/_build_info.py

            - name: Build server and package
              working-directory: cli
              run: python build.py --force
              env:
                  NODE_OPTIONS: --max-old-space-size=4096
                  PYTHONUTF8: '1'

            - name: Rename wheel with platform tag
              working-directory: cli/dist
              run: |
                  for f in *.whl; do
                    # Replace -any.whl with platform-specific tag
                    newname="${f%-py3-none-any.whl}-py3-none-${{ matrix.wheel-tag }}.whl"
                    echo "Renaming $f -> $newname"
                    mv "$f" "$newname"
                  done
                  ls -la

            - name: Upload wheel artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wheel-${{ matrix.wheel-tag }}
                  path: cli/dist/*.whl
                  retention-days: 7

    smoke-test:
        name: Smoke test built wheel (linux-x64, duckdb + openai)
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Download Linux x64 wheel
              uses: actions/download-artifact@v4
              with:
                  name: wheel-manylinux2014_x86_64
                  path: dist

            - name: List downloaded wheels
              run: ls -la dist/

            - name: Install nao-core from wheel (with duckdb + openai extras)
              run: |
                  WHEEL=$(ls dist/*.whl | head -n1)
                  if [ -z "$WHEEL" ]; then
                    echo "::error::No wheel found in dist/"
                    exit 1
                  fi
                  echo "Installing $WHEEL[duckdb,openai]"
                  python -m pip install --upgrade pip
                  python -m pip install "${WHEEL}[duckdb,openai]"

            - name: Verify nao --version
              run: nao --version

            - name: Prepare smoke-test project
              run: |
                  mkdir -p smoke-project
                  cp example/jaffle_shop.duckdb smoke-project/
                  mkdir -p smoke-project/tests
                  cp example/tests/total_revenue.yml smoke-project/tests/

                  cat > smoke-project/nao_config.yaml <<'YAML'
                  project_name: smoke-project
                  databases:
                    - name: duckdb-jaffle-shop
                      type: duckdb
                      path: ./jaffle_shop.duckdb
                      templates:
                        - columns
                        - preview
                      profiling:
                        refresh_policy: interval
                        interval_days: 1
                      include: []
                      exclude: []
                  llm:
                    provider: openai
                    api_key: "{{ env('OPENAI_API_KEY') }}"
                  repos: []
                  notion: null
                  slack: null
                  YAML

                  echo "---- nao_config.yaml ----"
                  cat smoke-project/nao_config.yaml

            - name: nao init (non-interactive)
              working-directory: smoke-project
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
              run: nao init --yes

            - name: nao sync
              working-directory: smoke-project
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
              run: nao sync

            - name: Start nao chat in background
              working-directory: smoke-project
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  ENABLE_USER_LOGIN: 'true'
                  ENABLE_USER_SIGNUP: 'true'
                  BETTER_AUTH_URL: 'http://localhost:5005'
                  BROWSER: 'none'
              run: |
                  set -euo pipefail
                  nohup nao chat > chat.log 2>&1 &
                  echo $! > chat.pid
                  echo "Started nao chat (pid $(cat chat.pid))"

                  echo "Waiting for chat server on http://localhost:5005/api ..."
                  for i in $(seq 1 90); do
                    if curl -fsS http://localhost:5005/api > /dev/null 2>&1; then
                      echo "Chat server is up after ${i}s"
                      exit 0
                    fi
                    sleep 1
                  done

                  echo "::error::Chat server failed to come up within 90s"
                  echo "---- chat.log ----"
                  cat chat.log || true
                  exit 1

            - name: Sign up admin user
              run: |
                  set -euo pipefail
                  curl -fsS -X POST http://localhost:5005/api/auth/sign-up/email \
                    -H 'Content-Type: application/json' \
                    -d '{"name":"Smoke Test","email":"smoke@nao.test","password":"smoke-password-1234"}' \
                    -o signup.json
                  echo "---- signup response ----"
                  cat signup.json

            - name: nao test (openai:gpt-4.1-mini against DuckDB jaffle_shop)
              working-directory: smoke-project
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  NAO_USERNAME: smoke@nao.test
                  NAO_PASSWORD: smoke-password-1234
                  BACKEND_URL: 'http://localhost:5005'
              run: nao test -m openai:gpt-4.1-mini -s total_revenue

            - name: Dump chat.log on failure
              if: failure()
              working-directory: smoke-project
              run: |
                  echo "---- chat.log ----"
                  cat chat.log || true

            - name: Stop nao chat
              if: always()
              working-directory: smoke-project
              run: |
                  if [ -f chat.pid ]; then
                    PID=$(cat chat.pid)
                    if kill -0 "$PID" 2>/dev/null; then
                      kill "$PID" || true
                      sleep 2
                      kill -9 "$PID" 2>/dev/null || true
                    fi
                  fi

    publish:
        needs: [build, smoke-test]
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write # For trusted publishing

        steps:
            - name: Download all wheel artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: wheel-*
                  merge-multiple: true
                  path: dist/

            - name: List wheels
              run: ls -la dist/

            - name: Setup uv
              uses: astral-sh/setup-uv@v5

            - name: Publish to PyPI
              run: uv publish dist/*
              env:
                  UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
